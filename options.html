<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motrix Integration Settings</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-background"></div>
  <div class="container">
    <header class="header">
      <img src="icons/icon48.png" alt="Motrix" class="logo">
      <div>
        <h1>Motrix Integration</h1>
        <p class="subtitle">Settings & Preferences</p>
      </div>
    </header>

    <main class="content">
      <div class="card">
        <h2>Connection Settings</h2>
        
        <div class="form-group">
          <label for="rpcUrl">RPC Server URL</label>
          <input type="text" id="rpcUrl" placeholder="http://127.0.0.1:16800/jsonrpc">
          <span class="help-text">Default port for Motrix is 16800.</span>
        </div>

        <div class="form-group">
          <label for="secretToken">Secret Token (Optional)</label>
          <input type="password" id="secretToken" placeholder="Leave empty if not set">
        </div>

        <div class="btn-group">
          <button id="testBtn" class="btn secondary-btn">Test Connection</button>
          <span id="testResult" class="test-result"></span>
        </div>
      </div>

      <div class="card">
        <h2>Interception Rules</h2>
        
        <div class="form-group">
          <label for="minFileSize">Minimum File Size (MB)</label>
          <input type="number" id="minFileSize" min="0" placeholder="0">
          <span class="help-text">Set to 0 to intercept all files regardless of size.</span>
        </div>

        <div class="form-group">
          <label for="blockedExtensions">Blocked Extensions</label>
          <input type="text" id="blockedExtensions" placeholder="html, php, torrent">
          <span class="help-text">Comma-separated list of extensions to ignore (e.g., pdf, html, txt).</span>
        </div>
      </div>
    </main>

    <footer class="footer">
      <span id="saveStatus" class="save-status"></span>
      <button id="saveBtn" class="btn primary-btn">Save Settings</button>
    </footer>
  </div>
  <script src="options.js"></script>
</body>
</html>
